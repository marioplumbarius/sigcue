name: CI

on:
  push:
    branches: [ main, "claude-*" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint
        continue-on-error: true

  test:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    name: Test
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

  build-debug:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: macos-latest
    name: Build (Debug)
    steps:
      - uses: actions/checkout@v4

      - name: Build Debug
        run: make build

      - name: Upload Debug Build
        uses: actions/upload-artifact@v4
        with:
          name: sigcue-debug
          path: build/**/Debug/sigcue.app
          if-no-files-found: warn
          retention-days: 5

  build-release:
    if: github.event_name == 'push'
    needs: test
    runs-on: macos-latest
    name: Build (Release)
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: make build-release

      - name: Upload Release Build
        uses: actions/upload-artifact@v4
        with:
          name: sigcue-release
          path: build/**/Release/sigcue.app
          if-no-files-found: warn
          retention-days: 5

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release
    runs-on: macos-latest
    name: Create Release
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: sigcue-release

      - name: Prepare assets
        run: |
          mkdir -p release-assets
          find . -name "sigcue.app" -type d | head -1 | xargs -I {} cp -R {} release-assets/
          cd release-assets
          zip -r ../sigcue.zip sigcue.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: sigcue.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
