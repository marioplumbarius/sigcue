name: Lint & Format

on:
  push:
    branches: [ main, "claude-*" ]
  pull_request:
    branches: [ main ]

jobs:
  swift-lint:
    runs-on: macos-latest
    name: SwiftLint
    steps:
      - uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          swiftlint
        continue-on-error: true
