name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: macos-latest
    name: Build Release
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: make build-release

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          find build -name "sigcue.app" -type d | head -1 | xargs -I {} cp -R {} release-assets/
          cd release-assets
          zip -r ../sigcue.zip sigcue.app

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: sigcue.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
